<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imam Fora Stranicu</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #8f979c, #b5bcc2);
    min-height:100vh;
    padding:30px;
    color:#111;
}

/* GORNJI DIO */
.top-bar{
    position:relative;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:40px;
}

/* NAZAD GUMB */
.back-btn{
    position:absolute;
    left:0;
    top:0;
    background:#e4e7ea;
    border:3px solid #314652;
    border-radius:15px;
    padding:14px 28px;
    font-size:22px;
    font-weight:600;
    text-decoration:none;
    color:#111;
    box-shadow:0 6px 15px rgba(0,0,0,0.15);
    transition:0.2s ease;
}

.back-btn:hover{
    transform:translateY(-3px);
    background:#d8dde1;
}

/* NASLOV */
.title{
    background:#e4e7ea;
    border:4px solid #314652;
    border-radius:30px;
    padding:45px 100px;
    font-size:42px;
    font-weight:bold;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* SADRŽAJ */
.content{
    width:100%;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
    align-items:stretch;
}

/* TEKST BOX */
.text-box{
    background:#eef0f2;
    border:4px solid #314652;
    border-radius:60px;
    min-height:620px;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:50px;
    font-size:40px;
    font-weight:600;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.18);
}

/* SLIKA */
.image-box{
    border-radius:40px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.image-box img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* RESPONSIVE */
@media (max-width: 900px){

    .title{
        font-size:28px;
        padding:30px 40px;
    }

    .content{
        grid-template-columns:1fr;
    }

    .text-box{
        min-height:300px;
        font-size:28px;
        border-radius:40px;
    }

    .back-btn{
        position:static;
        margin-bottom:20px;
    }

    .top-bar{
        flex-direction:column;
        gap:20px;
    }
}
</style>

</head>
<body>

<div class="top-bar">

    <a href="https://andrijaradas.com" class="back-btn">nazad</a>

    <div class="title">
        IMAM FORA STRANICU
    </div>

</div>

<div class="content">

    <div class="text-box">
        NAPRAVIO SAM STRANICU PA TO VALJDA NEŠ ZNAČI
    </div>

    <div class="image-box">
        <img src="maca.png" alt="fora slika">
    </div>

</div>

</body>
</html>
