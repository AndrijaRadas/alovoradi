<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Razlozi</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #8f979c, #b5bcc2);
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* NASLOV */
.title {
    margin: 50px 20px;
    padding: 30px;
    max-width: 900px;
    background: #e4e7ea;
    border-radius: 25px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    font-size: 26px;
    font-weight: bold;
    text-align: center;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 40px;
    width: 80%;
    max-width: 800px;
}

/* GUMB */
.card {
    background: #e0e3e6;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    font-size: 22px;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
}

.card:hover {
    transform: translateY(-5px);
    background: #d2d6da;
}

/* LINK (da izgleda kao gumb) */
a {
    text-decoration: none;
    color: inherit;
}

/* DONJI GUMB */
.bottom {
    margin: 60px 0;
}

.bottom .card {
    padding: 25px 60px;
    background: #6f7a82;
    color: white;
}

.bottom .card:hover {
    background: #5d666d;
}

/* RESPONSIVE */
@media (max-width: 600px) {
    .grid {
        grid-template-columns: 1fr;
    }
}
</style>

</head>
<body>

<div class="title">
    ZAŠTO BI JA ANDRIJA RADAŠ TREBAO IMATI PETICU IZ RAČUNALNIH MREŽA
</div>

<div class="grid">
    <a href="https://andrijaradas.com/razlog1"" target="_blank">
        <div class="card">RAZLOG 1</div>
    </a>

    <a href="https://andrijaradas.com/razlog2" target="_blank">
        <div class="card">RAZLOG 2</div>
    </a>

    <a href="https://andrijaradas.com/razlog3" target="_blank">
        <div class="card">RAZLOG 3</div>
    </a>

    <a href="https://andrijaradas.com/razlog4" target="_blank">
        <div class="card">RAZLOG 4</div>
    </a>
</div>

<div class="bottom">
    <a href="https://e-dnevnik.skole.hr/" target="_blank">
        <div class="card">E-DNEVNIK</div>
    </a>
</div>

</body>
</html>
